<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Disney+ Dual Subtitles</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <h2 id="appName">Disney+ Dual Sub</h2>
        <a href="https://disney-plus-dual-subtitles.magang.net/" target="_blank" class="docs-link" title="Help & Documentation">❓</a>
      </div>
      <label class="switch">
        <input type="checkbox" id="enableToggle" checked>
        <span class="slider round"></span>
      </label>
    </div>

    <div class="settings" id="settingsPanel">
      <div class="setting-group">
        <div class="setting-row">
          <label for="primaryLang" id="primaryLangLabel">Primary Lang:</label>
          <select id="primaryLang"></select>
        </div>
        <div class="style-row">
          <input type="color" id="primaryColor" title="Text Color">
          <input type="color" id="primaryBg" title="Background Color">
          <input type="number" id="primarySize" min="10" max="60" step="1" title="Font Size">
          <button id="primaryBold" class="toggle-btn">B</button>
        </div>
      </div>

      <div class="setting-group">
        <div class="setting-row">
          <label for="secondaryLang" id="secondaryLangLabel">Secondary Lang:</label>
          <select id="secondaryLang"></select>
        </div>
        <div class="style-row">
          <input type="color" id="secondaryColor" title="Text Color">
          <input type="color" id="secondaryBg" title="Background Color">
          <input type="number" id="secondarySize" min="10" max="60" step="1" title="Font Size">
          <button id="secondaryBold" class="toggle-btn">B</button>
        </div>
      </div>
    </div>
    <div id="subtitleHint" class="subtitle-hint hide"></div>
    <div class="footer">
      <button id="resetBtn" class="secondary-btn">Reset</button>
      <button id="saveBtn">Save</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
